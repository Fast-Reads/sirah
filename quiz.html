<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>اختبار شامل — الرحيق المختوم</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root{--navy:#1e3a5f;--navy-deep:#0d1b2a;--gold:#b8860b;--gold-light:#f5e6c8;--gold-pale:#fdf6e3;--cream:#faf8f2;--white:#fff;--text:#2d3436;--text-light:#636e72;--border:#e8e0d4;--shadow:rgba(30,58,95,.08);--radius:14px;--green:#2e7d32;--green-bg:#e8f5e9;--red:#c53030;--red-bg:#fde8e8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Tajawal','Segoe UI',sans-serif;background:var(--cream);color:var(--text);line-height:1.9;-webkit-font-smoothing:antialiased}
    .hero{background:linear-gradient(160deg,#0a1628 0%,#132f4c 40%,#1e3a5f 100%);color:#fff;padding:3.5rem 1.5rem 4.5rem;text-align:center;position:relative;overflow:hidden}
    .hero::before{content:"";position:absolute;inset:0;background-image:radial-gradient(1.5px 1.5px at 20% 30%,rgba(184,134,11,.3) 50%,transparent 50%),radial-gradient(1px 1px at 60% 20%,rgba(255,255,255,.15) 50%,transparent 50%),radial-gradient(1.5px 1.5px at 80% 60%,rgba(184,134,11,.2) 50%,transparent 50%),radial-gradient(1px 1px at 40% 70%,rgba(255,255,255,.1) 50%,transparent 50%);background-size:200px 200px;animation:twinkle 8s ease-in-out infinite alternate}
    @keyframes twinkle{from{opacity:.6}to{opacity:1}}
    .hero>*{position:relative;z-index:1}
    .hero-ornament{width:60px;height:3px;background:var(--gold);margin:0 auto 1.2rem;border-radius:2px}
    .hero h1{font-family:'Amiri',serif;font-size:2.6rem;font-weight:700;margin-bottom:.5rem}
    .hero .subtitle{font-size:.95rem;color:rgba(255,255,255,.7);max-width:640px;margin:0 auto;line-height:1.7}
    .breadcrumb{background:var(--white);border-bottom:1px solid var(--border);padding:.6rem 1rem;display:flex;justify-content:center;gap:.5rem;flex-wrap:wrap;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px var(--shadow)}
    .breadcrumb a{text-decoration:none;color:var(--text-light);font-size:.85rem;font-weight:500;padding:.4rem .85rem;border-radius:8px;transition:all .2s}
    .breadcrumb a:hover{background:var(--gold-pale);color:var(--navy)}
    .breadcrumb .current{color:var(--navy);font-weight:700}
    main{max-width:880px;margin:0 auto;padding:2.5rem 1.5rem 4rem}
    .score-bar{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.75rem;margin-bottom:1.5rem;box-shadow:0 2px 12px var(--shadow);display:flex;justify-content:space-between;align-items:center}
    .score-bar span{font-size:.9rem;color:var(--text-light);font-weight:500}
    .score-bar .score{font-family:'Amiri',serif;font-size:1.2rem;color:var(--navy);font-weight:700}
    .quiz-section{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:1rem;box-shadow:0 4px 24px var(--shadow);overflow:hidden}
    .quiz-section summary{cursor:pointer;padding:1.1rem 1.5rem;font-weight:700;font-size:1.05rem;color:var(--navy);display:flex;justify-content:space-between;align-items:center;transition:background .2s;list-style:none}
    .quiz-section summary::-webkit-details-marker{display:none}
    .quiz-section summary::marker{content:""}
    .quiz-section summary:hover{background:rgba(245,230,200,.25)}
    .quiz-section summary .arrow{transition:transform .3s;font-size:.8rem;color:var(--text-light)}
    .quiz-section[open] summary .arrow{transform:rotate(90deg)}
    .section-content{padding:0 1.5rem 1.5rem}
    .q-card{background:var(--cream);border:1px solid var(--border);border-radius:10px;padding:1.25rem 1.4rem;margin-top:1rem}
    .q-card h4{margin:0 0 .4rem;color:var(--navy);font-size:.98rem;font-weight:700}
    .q-card p{margin:0 0 .8rem;font-size:.93rem;color:var(--text)}
    .q-opts{display:flex;flex-direction:column;gap:.5rem}
    .q-opts button{border:1px solid var(--border);background:var(--white);border-radius:10px;padding:.7rem 1rem;font-size:.93rem;font-family:'Tajawal',sans-serif;text-align:right;cursor:pointer;transition:all .2s;color:var(--text)}
    .q-opts button:hover{background:var(--gold-pale);border-color:var(--gold-light)}
    .q-opts button.q-correct{border-color:var(--green)!important;background:var(--green-bg)!important;color:var(--green)!important;font-weight:600}
    .q-opts button.q-wrong{border-color:var(--red);background:var(--red-bg);color:var(--red)}
    .q-opts button.q-off{pointer-events:none;opacity:.6}
    .q-feedback{margin-top:.6rem;font-weight:700;font-size:.88rem;min-height:1.4em}
    .q-feedback.q-correct{color:var(--green)}
    .q-feedback.q-wrong{color:var(--red)}
    .retry-wrap{text-align:center;margin-top:2rem}
    .retry-btn{display:none;background:var(--navy);color:#fff;border:none;padding:.85rem 2.2rem;border-radius:var(--radius);font-family:'Tajawal',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;transition:background .2s}
    .retry-btn:hover{background:var(--gold)}
    footer{text-align:center;padding:2rem 1.5rem;border-top:1px solid var(--border);color:var(--text-light);font-size:.82rem}
    footer span{color:var(--gold)}
    @media(max-width:700px){.hero h1{font-size:2rem}.hero{padding:2.5rem 1.2rem 3rem}.section-content{padding:0 1rem 1rem}.score-bar{flex-direction:column;gap:.5rem;text-align:center}}
  </style>
</head>
<body>

  <header class="hero">
    <div class="hero-ornament"></div>
    <h1>اختبار شامل</h1>
    <p class="subtitle">١٢١ سؤالًا تغطي جميع فصول «الرحيق المختوم» — من موقع العرب إلى الوفاة النبوية. افتح كل قسم وأجب، ثم أعد المحاولة حتى تحفظ كل المفاهيم.</p>
  </header>

  <nav class="breadcrumb">
    <a href="index.html">الصفحة الرئيسة</a>
    <span class="current">الاختبار الشامل</span>
  </nav>

  <main>
    <div class="score-bar">
      <span>النتيجة</span>
      <span class="score" id="score-display">٠ / ١٢١</span>
    </div>
    <div id="quiz-container"></div>
    <div class="retry-wrap">
      <button class="retry-btn" id="retry-btn">أعد المحاولة بترتيب جديد</button>
    </div>
  </main>

  <footer>
    الرحيق المختوم <span>&bull;</span> صفي الرحمن المباركفوري
    <span>&bull;</span> اختبار شامل لجميع الفصول
  </footer>

  <script>
  (function(){
    const toAr=n=>n.toString().replace(/\d/g,d=>'٠١٢٣٤٥٦٧٨٩'[d]);
    function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}

    const sections=[
      /* ══════ 1. موقع العرب ══════ */
      {title:'القسم ١: موقع العرب وأقوامها',questions:[
        {t:'حصانة الجزيرة',q:'ما العنصر الطبيعي الذي منح الجزيرة العربية حصانة ضد القوى الخارجية؟',o:['الأودية النهرية الواسعة','الصحارى والرمال التي تحيط بالجزيرة من كل الجهات','الغابات المدارية'],a:1},
        {t:'الممرات العالمية',q:'ما الذي جعل الموانئ العربية محطات إلزامية للسفن والقوافل؟',o:['انعزالها عن البحار','اتصالها ببحري العرب والأحمر ومسارات الهند','وجود ثلوج دائمة في تهامة'],a:1},
        {t:'الهجرات القحطانية',q:'ما السبب الأبرز وراء هجرة البطون القحطانية قبل الإسلام؟',o:['البحث عن المناخ البارد','انهيار سد مأرب وتراجع التجارة بعد سيطرة الرومان والأحباش','ظهور الذهب في الشمال'],a:1}
      ]},

      /* ══════ 2. الحكم والإمارة ══════ */
      {title:'القسم ٢: الحكم والإمارة في العرب',questions:[
        {t:'أنماط الحكم',q:'ما التركيبة التي لخصت مشهد الحكم في الجزيرة؟',o:['ملوك بتيجان مستقلون تمامًا وجمهوريات','ملوك تابعون لقوى كبرى ورؤساء قبائل يحكمون تقليديًا','ولاة عثمانيون مع برلمانات'],a:1},
        {t:'حزام الحدود',q:'لماذا دعمت القوى الكبرى حلفاء عربًا عند حدودها؟',o:['لإنشاء حزام أمني يرد الغارات ويحمي التجارة','لإرسالهم إلى أوروبا','لتحويلهم إلى رهبان'],a:0},
        {t:'تجربة اليمن',q:'ما السمة التي ميزت الحكم في اليمن عبر العصور؟',o:['ثبات السلالة دون تدخل خارجي','توالي سلالات محلية ثم تدخلات رومانية وأحباش وفُرس','خضوع كامل لملوك الشام فقط'],a:1}
      ]},

      /* ══════ إبراهيم عليه السلام ══════ */
      {title:'سيرة إبراهيم عليه السلام',questions:[
        {t:'الجذور والموطن',q:'من أين بدأت رحلة إبراهيم قبل أن يستقر نسله في مكة؟',o:['من «أُر» بالعراق ثم حاران ففلسطين','من الأندلس','من الهند مباشرة'],a:0},
        {t:'زيارة مصر',q:'ما الدرس الذي أبرزته الرحلة إلى مصر؟',o:['تحول إبراهيم إلى ملك على مصر','حفظ الله لسارة ثم إهداء هاجر فبدء نسل إسماعيل','هدم الكعبة'],a:1},
        {t:'معجزة زمزم',q:'ما النتيجة المباشرة لسعي هاجر بين الصفا والمروة؟',o:['جفاف الوادي','تفجر زمزم واستقرار جرهم حول إسماعيل','تحول مكة إلى مركز صناعي'],a:1},
        {t:'رفع القواعد',q:'ما الحدث المحوري في الزيارة الثالثة لإبراهيم إلى مكة؟',o:['رفع قواعد الكعبة وإحياء المناسك','الهجرة إلى اليمن','ترك الحج نهائيًا'],a:0},
        {t:'الدروس المركزية',q:'كيف تُظهر قصة إبراهيم اجتماع الاستقلال والانفتاح في مكة؟',o:['بنقل القبائل إلى أوروبا','بتحويل مكة إلى ثكنة عسكرية','بتأسيس مركز روحي حر يستقبل الحجيج والتجارة'],a:2}
      ]},

      /* ══════ 3. الديانات ══════ */
      {title:'القسم ٣: الديانات عند العرب',questions:[
        {t:'مُدخل الأصنام',q:'من الذي أدخل عبادة الأصنام إلى مكة؟',o:['قصي بن كلاب','عمرو بن لحي الخزاعي','عبد المطلب بن هاشم'],a:1},
        {t:'اللات',q:'أين كان موقع صنم اللات؟',o:['في الطائف عند ثقيف','في مكة عند الكعبة','في نجران عند النصارى'],a:0},
        {t:'بقايا ملة إبراهيم',q:'كيف تعامل الإسلام مع شعائر الحج الموروثة؟',o:['ألغاها كلها وأسس شعائر جديدة','نقّاها من الشرك وأبقى الأصل الإبراهيمي','أبقاها كما هي دون تغيير'],a:1},
        {t:'أصحاب الأخدود',q:'مَن الملك الذي أحرق نصارى نجران في الأخدود؟',o:['أبرهة الحبشي','ذو نُوَاس الحِمْيَري','سيف بن ذي يزن'],a:1},
        {t:'ورقة بن نوفل',q:'ما دور ورقة بن نوفل في بداية الوحي؟',o:['رفض تصديق النبي ﷺ','أخبره أن الذي جاءه هو الناموس الذي أُنزل على موسى','كان أول من أسلم من الرجال'],a:1}
      ]},

      /* ══════ 4. صور من المجتمع الجاهلي ══════ */
      {title:'القسم ٤: صور من المجتمع الجاهلي',questions:[
        {t:'الوحدة الأساسية',q:'ما الوحدة السياسية والاجتماعية الأساسية في المجتمع الجاهلي؟',o:['الدولة المركزية','القبيلة','المدينة','الأسرة النووية'],a:1},
        {t:'العصبية القبلية',q:'ما معنى «انصر أخاك ظالمًا أو مظلومًا» في الجاهلية؟',o:['ساعد أخاك على العدل في الحالتين','قف مع قبيلتك سواء كانت على حق أو باطل','انصح أخاك إذا ظلم','حارب عدوك فقط إذا ظُلمت'],a:1},
        {t:'وأد البنات',q:'ما المقصود بوأد البنات في الجاهلية؟',o:['حرمان البنت من التعليم','دفن البنت الصغيرة حية خوفًا من العار أو الفقر','تزويج البنت دون رضاها','منع البنت من الميراث فقط'],a:1},
        {t:'نظام الإيلاف',q:'ما نظام «الإيلاف» الذي ابتكره هاشم بن عبد مناف؟',o:['نظام ضرائب على سكان مكة','اتفاقيات حماية مع القبائل على طريق القوافل مقابل حصة من الأرباح','نظام عسكري لحراسة الكعبة','معاهدة سلام بين قريش ويثرب'],a:1},
        {t:'الشعر والقرآن',q:'لماذا كان تحدّي القرآن البلاغي حجة بالغة على العرب؟',o:['لأن العرب لا يعرفون الشعر أصلًا','لأنهم كانوا أفصح أمة وخبراء اللغة فعجزهم عن الإتيان بمثله أكبر حجة','لأن القرآن كان مكتوبًا وهم أميون','لأنه نزل بلغة غير عربية'],a:1}
      ]},

      /* ══════ 5. نسب النبي ﷺ ══════ */
      {title:'القسم ٥: نسب النبي ﷺ وأسرته',questions:[
        {t:'الاصطفاء',q:'ما الحديث الذي يبيّن اصطفاء نسب النبي ﷺ؟',o:['«خيركم خيركم لأهله»','«إن الله اصطفى كنانة من ولد إسماعيل، واصطفى قريشًا من كنانة، واصطفى من قريش بني هاشم، واصطفاني من بني هاشم»','«المسلم أخو المسلم»','«إنما الأعمال بالنيات»'],a:1},
        {t:'قصي بن كلاب',q:'ما الإنجاز الرئيسي لقصي بن كلاب؟',o:['حفر بئر زمزم','جمع قريشًا وأسس نظام الحكم في مكة','قاد أول غزوة ضد الروم','بنى كنيسة القُلَّيس'],a:1},
        {t:'لقب هاشم',q:'لماذا لُقّب عمرو بن عبد مناف بـ«هاشم»؟',o:['لأنه هَشَم جدار الكعبة وأعاد بناءه','لأنه كان يهشم الثريد ويُطعم الحجاج','لأنه هشم أعداءه في معركة كبرى','لأنه هشم الأصنام حول الكعبة'],a:1},
        {t:'حفر زمزم',q:'كيف عرف عبد المطلب موضع بئر زمزم المطمورة؟',o:['وجد خريطة من عهد إسماعيل','رأى في المنام من يدلّه على موضعها','أخبره كاهن من اليمن بموقعها','عثر عليها صدفة أثناء بناء بيت'],a:1},
        {t:'ابن الذبيحَين',q:'لماذا قال النبي ﷺ: «أنا ابن الذبيحَين»؟',o:['لأن أباه وجده قُتلا في الحروب','لأن جده إسماعيل فُدي بكبش وأباه عبد الله فُدي بمئة ناقة','لأنه ذبح قربانين في حجة الوداع','لأن عمَّيه حمزة والعباس كانا ذبيحَين'],a:1}
      ]},

      /* ══════ 6. المولد ══════ */
      {title:'القسم ٦: المولد وأربعون عامًا قبل النبوة',questions:[
        {t:'عام المولد',q:'في أي عام وُلد النبي ﷺ؟',o:['عام الحزن','عام الفيل','عام الحديبية','عام الفتح'],a:1},
        {t:'يوم الولادة',q:'في أي يوم من الأسبوع وُلد النبي ﷺ؟',o:['الجمعة','الخميس','الاثنين','الأربعاء'],a:2},
        {t:'المرضعة',q:'مَن التي أرضعت النبي ﷺ في البادية؟',o:['أم أيمن','حليمة السعدية','آمنة بنت وهب','ثويبة مولاة أبي لهب'],a:1},
        {t:'لقب الأمين',q:'لماذا لقّبت قريش محمدًا ﷺ بالأمين قبل البعثة؟',o:['لأنه كان أغنى شباب قريش','لصدقه المطلق وأمانته التي لم يُعرف عنه خلافها قط','لأنه كان يحرس الكعبة','لأنه كان أكبرهم سنًّا'],a:1},
        {t:'أول ما نزل',q:'ما أول آيات القرآن نزولًا؟',o:['﴿يا أيها المدثّر قم فأنذر﴾','﴿بسم الله الرحمن الرحيم﴾','﴿اقرأ باسم ربك الذي خلق﴾','﴿قل هو الله أحد﴾'],a:2}
      ]},

      /* ══════ 7. نزول الوحي ══════ */
      {title:'القسم ٧: نزول الوحي والدعوة السرية',questions:[
        {t:'أول الوحي',q:'ما أول صور الوحي التي بُدئ بها النبي ﷺ قبل نزول جبريل؟',o:['سماع أصوات من السماء','الرؤيا الصادقة في المنام','رؤية نور في الغار','أحلام مزعجة متكررة'],a:1},
        {t:'الضمّات الثلاث',q:'ماذا فعل جبريل بالنبي ﷺ قبل أن يقرأ الآيات الأولى؟',o:['هزّ الغار ثلاث مرات','ضمّه (غطّه) ثلاث مرات حتى بلغ منه الجهد','لمس صدره ثلاث مرات','أشار إليه ثلاث مرات'],a:1},
        {t:'أول المسلمين',q:'مَن أول مَن آمن بالنبي ﷺ مطلقًا؟',o:['أبو بكر الصديق','علي بن أبي طالب','خديجة بنت خويلد','زيد بن حارثة'],a:2},
        {t:'أبو بكر والدعوة',q:'كم من العشرة المبشرين بالجنة أسلموا على يد أبي بكر؟',o:['اثنان','ثلاثة','خمسة','سبعة'],a:2},
        {t:'طابع القرآن المكي',q:'ما الموضوعات الرئيسية للقرآن المكي المبكر؟',o:['أحكام الزواج والطلاق والميراث','التوحيد واليوم الآخر وقصص الأنبياء والأخلاق','تنظيم الدولة والجيش والضرائب','أحكام التجارة والعقود'],a:1}
      ]},

      /* ══════ 8. الجهر بالدعوة ══════ */
      {title:'القسم ٨: الجهر بالدعوة ومواجهة قريش',questions:[
        {t:'مدة الدعوة السرية',q:'كم سنة استمرت الدعوة السرية قبل الجهر؟',o:['سنة واحدة','ثلاث سنوات','خمس سنوات','سبع سنوات'],a:1},

        {t:'مالك بن عوف',q:'ماذا حدث لمالك بن عوف قائد هوازن بعد المعركة؟',o:['قُتل في المعركة','فرّ ولم يُسمع عنه بعدها','جاء مسلمًا وصار واليًا على قومه','أُسر وبقي سجينًا'],a:2},
        {t:'الدرس القرآني',q:'ما الآية التي عاتب بها القرآن المسلمين على إعجابهم بكثرتهم يوم حنين؟',o:['﴿وما النصر إلا من عند الله﴾','﴿ويوم حنين إذ أعجبتكم كثرتكم فلم تغنِ عنكم شيئًا﴾','﴿ولا تهنوا ولا تحزنوا﴾','﴿كم من فئة قليلة غلبت فئة كثيرة﴾'],a:1}

      {title:'القسم ٢١: غزوة تبوك',questions:[
        {t:'سبب غزوة تبوك',q:'ما السبب الرئيسي لغزوة تبوك؟',o:['ثأر لمعركة مؤتة','أنباء عن حشود بيزنطية على الحدود الشمالية','طلب من أهل تبوك','توسيع حدود الدولة'],a:1},
        {t:'حجم الجيش',q:'كم بلغ عدد الجيش الإسلامي في تبوك؟',o:['ثلاثة آلاف','عشرة آلاف','ثلاثون ألفًا','خمسون ألفًا'],a:2},
        {t:'تبرع أبي بكر',q:'كم تبرّع أبو بكر الصديق لتجهيز جيش تبوك؟',o:['نصف ماله','ثلث ماله','ربع ماله','كل ماله'],a:3},
        {t:'البكّاؤون',q:'لماذا بكى البكّاؤون من فقراء المسلمين؟',o:['خوفًا من الروم','لأنهم لم يجدوا ما ينفقون وراحلة تحملهم','لأن النبي ﷺ رفض خروجهم','لأنهم أُصيبوا في المعركة'],a:1},
        {t:'الثلاثة المخلَّفون',q:'لماذا عُومل الثلاثة الذين خُلّفوا بشكل مختلف عن بقية المتخلفين؟',o:['لأنهم اعترفوا بصدق ولم يكذبوا كالمنافقين','لأنهم كانوا من كبار الصحابة','لأن لهم أعذارًا جزئية','لأنهم طلبوا العفو بأنفسهم'],a:0}
      ]},

      /* ══════ 22. عام الوفود ══════ */
      {title:'القسم ٢٢: عام الوفود',questions:[
        {t:'سبب التسمية',q:'لماذا سُمّيت السنة التاسعة هجرية بـ«عام الوفود»؟',o:['لأن النبي ﷺ أرسل وفودًا إلى القبائل','لأن القبائل العربية جاءت وفودًا تعلن إسلامها','لأن وفودًا من الروم زارت المدينة','لأن الأنصار وفدوا إلى مكة'],a:1},
        {t:'العامل الأهم',q:'ما العامل الأهم الذي دفع القبائل لإرسال وفودها؟',o:['غزوة تبوك','صلح الحديبية','فتح مكة','غزوة حنين'],a:2},
        {t:'سورة النصر',q:'ما السورة التي وصفت دخول الناس في دين الله أفواجًا؟',o:['سورة الفتح','سورة التوبة','سورة النصر','سورة الأنفال'],a:2},
        {t:'وفد عبد القيس',q:'ما أول وفد جاء إلى النبي ﷺ من شرق الجزيرة؟',o:['وفد ثقيف','وفد عبد القيس','وفد تميم','وفد نجران'],a:1},
        {t:'معاذ إلى اليمن',q:'من أرسله النبي ﷺ قاضيًا ومعلمًا إلى اليمن؟',o:['أبو موسى الأشعري','علي بن أبي طالب','معاذ بن جبل','خالد بن الوليد'],a:2}
      ]},

      /* ══════ 23. حجة الوداع ══════ */
      {title:'القسم ٢٣: حجة الوداع وإلى الرفيق الأعلى',questions:[
        {t:'تاريخ الحج',q:'في أي سنة هجرية كانت حجة الوداع؟',o:['السنة الثامنة','السنة التاسعة','السنة العاشرة','السنة الحادية عشرة'],a:2},
        {t:'عدد الحجاج',q:'كم كان عدد المسلمين الذين حجّوا مع النبي ﷺ تقريبًا؟',o:['عشرة آلاف','أربعون ألفًا','سبعون ألفًا','أكثر من مئة ألف'],a:3},
        {t:'آية الإكمال',q:'ما الآية التي نزلت يوم عرفة في حجة الوداع؟',o:['﴿إنا فتحنا لك فتحًا مبينًا﴾','﴿اليوم أكملت لكم دينكم﴾','﴿إذا جاء نصر الله والفتح﴾','﴿واتقوا يومًا ترجعون فيه إلى الله﴾'],a:1},
        {t:'تاريخ الوفاة',q:'متى توفّي النبي ﷺ؟',o:['١٢ ربيع الأول سنة ١١ هـ','١ محرم سنة ١١ هـ','١٥ رمضان سنة ١٠ هـ','١٠ ذي الحجة سنة ١٠ هـ'],a:0},
        {t:'كلمة أبي بكر',q:'ماذا قال أبو بكر حين خرج إلى الناس بعد وفاة النبي ﷺ؟',o:['لقد مات خير البشر','من كان يعبد محمدًا فإن محمدًا قد مات ومن كان يعبد الله فإن الله حيّ لا يموت','يجب أن نختار خليفة فورًا','لا تبكوا فإنه في الجنة'],a:1}
      ]},

      /* ══════ البيت النبوي ══════ */
      {title:'ملحق: البيت النبوي',questions:[
        {t:'أولى الزوجات',q:'مَن أولى زوجات النبي ﷺ؟',o:['عائشة بنت أبي بكر','سودة بنت زمعة','خديجة بنت خويلد','حفصة بنت عمر'],a:2},
        {t:'أعلم نساء الأمة',q:'مَن وصفها العلماء بأنها أعلم نساء الأمة وروت ربع الأحاديث؟',o:['حفصة','أم سلمة','عائشة بنت أبي بكر','فاطمة الزهراء'],a:2},
        {t:'عدد الأولاد',q:'كم عدد أولاد النبي ﷺ (ذكورًا وإناثًا)؟',o:['خمسة','ستة','سبعة','ثمانية'],a:2},
        {t:'ذو النورين',q:'لماذا لُقّب عثمان بن عفان بـ«ذي النورين»؟',o:['لأنه تزوج ابنتين للنبي: رقية ثم أم كلثوم','لأنه حفظ سورتين من القرآن','لأنه هاجر هجرتين','لأنه أنفق مرتين في سبيل الله'],a:0},
        {t:'خُلقه القرآن',q:'مَن قالت عن خُلق النبي ﷺ: «كان خُلقه القرآن»؟',o:['فاطمة','خديجة','عائشة','أم سلمة'],a:2}
      ]}
    ];

    const totalQ=sections.reduce((s,sec)=>s+sec.questions.length,0);
    let correct=0,answered=0;
    const scoreEl=document.getElementById('score-display');
    const container=document.getElementById('quiz-container');
    const retryBtn=document.getElementById('retry-btn');

    function updateScore(){scoreEl.textContent=toAr(correct)+' / '+toAr(totalQ)}

    function buildQuiz(){
      correct=0;answered=0;container.innerHTML='';retryBtn.style.display='none';updateScore();
      let qNum=0;
      sections.forEach(function(sec,sIdx){
        const details=document.createElement('details');
        details.className='quiz-section';
        if(sIdx===0) details.open=true;

        const summary=document.createElement('summary');
        summary.innerHTML=sec.title+'<span class="arrow">&#x276F;</span>';
        details.appendChild(summary);

        const body=document.createElement('div');
        body.className='section-content';

        var qs=sec.questions.slice();
        shuffle(qs);

        qs.forEach(function(item){
          qNum++;
          var card=document.createElement('article');
          card.className='q-card';

          var h=document.createElement('h4');
          h.textContent='سؤال '+toAr(qNum)+': '+item.t;
          card.appendChild(h);

          var p=document.createElement('p');
          p.textContent=item.q;
          card.appendChild(p);

          var optsDiv=document.createElement('div');
          optsDiv.className='q-opts';

          var fb=document.createElement('div');
          fb.className='q-feedback';

          var indices=item.o.map(function(_,i){return i});
          shuffle(indices);

          indices.forEach(function(origIdx){
            var btn=document.createElement('button');
            btn.textContent=item.o[origIdx];
            btn.addEventListener('click',function(){
              if(card.dataset.done) return;
              card.dataset.done='1';
              answered++;

              optsDiv.querySelectorAll('button').forEach(function(b){b.classList.add('q-off')});
              optsDiv.querySelectorAll('button').forEach(function(b,bIdx){
                if(indices[bIdx]===item.a) b.classList.add('q-correct');
              });

              if(origIdx===item.a){
                btn.classList.add('q-correct');
                fb.textContent='إجابة صحيحة!';
                fb.className='q-feedback q-correct';
                correct++;
              } else {
                btn.classList.add('q-wrong');
                fb.textContent='إجابة غير صحيحة — الصحيحة موضحة بالأخضر.';
                fb.className='q-feedback q-wrong';
              }
              updateScore();
              if(answered===totalQ) retryBtn.style.display='inline-block';
            });
            optsDiv.appendChild(btn);
          });

          card.appendChild(optsDiv);
          card.appendChild(fb);
          body.appendChild(card);
        });

        details.appendChild(body);
        container.appendChild(details);
      });
    }

    retryBtn.addEventListener('click',function(){
      buildQuiz();
      window.scrollTo({top:0,behavior:'smooth'});
    });

    buildQuiz();
  })();
  </script>
